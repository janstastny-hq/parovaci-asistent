/* =========================================================================
   Data z reálných .txt souborů (proto-data.json) — vygenerováno původním
   parserem HeurekaAllInOne, takže obsah je 1:1 jako v Pythonu.
   ========================================================================= */
const DATA = await (await fetch('./proto-data.json')).json();
const CATEGORIES = DATA.categories;        // 3684 cest
const RULES = DATA.rules;                  // pravidla.txt
const PARAMS = DATA.params;                // parametry.txt (povinné)
const PARAMS_V2 = DATA.paramsV2;           // parametry-v2.txt (doporučené)
const RULES_KEYS = Object.keys(RULES).sort((a, b) => a.length - b.length);
const PARAMS_KEYS = Object.keys(PARAMS).sort((a, b) => a.length - b.length);
const PARAMS_V2_KEYS = Object.keys(PARAMS_V2).sort((a, b) => a.length - b.length);

/* ---- Portovaná logika z hledat_kategorie.py (beze změny chování) ---- */
// Kategorie, u kterých má být navíc doplněn EAN (čárový kód) — porovnává se leaf lowercase.
const EAN_CATEGORIES = new Set([
  'audioknihy', 'e-book elektronické knihy', 'filmy', 'hudba', 'knihy',
  'cizojazyčné knihy', 'komiksy a manga', 'mapy a průvodci', 'učebnice',
]);

const SYNONYMA = {
  iphone: 'mobilní telefony', ipad: 'tablety', airpods: 'sluchátka',
  playstation: 'herní konzole', xbox: 'herní konzole', marimex: 'bazény', intex: 'bazény',
};

function dejZakladSlova(slovo) {
  slovo = slovo.toLowerCase().trim().normalize('NFD').replace(/[̀-ͯ]/g, '');
  if (slovo.length <= 3) return slovo;
  const koncovky = ['ova','ove','ovy','ovou','oveho','ovemu','ovych','ovym','ovymi','ami','em','ech','ich','um','ou','am','y','e','a','i','o','u'];
  for (const k of koncovky) {
    if (slovo.endsWith(k)) {
      const r = slovo.slice(0, slovo.length - k.length);
      if (r.length >= 3) return r;
      break;
    }
  }
  return slovo;
}

// Levenshteinova vzdálenost (krátká slova) — pro toleranci překlepů
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (Math.abs(m - n) > 2) return 99;
  let prev = Array.from({ length: n + 1 }, (_, j) => j);
  for (let i = 1; i <= m; i++) {
    const cur = [i];
    for (let j = 1; j <= n; j++) {
      cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
    }
    prev = cur;
  }
  return prev[n];
}
// dvě (kmenová) slova se liší jen drobným překlepem? (porovnává se bez diakritiky)
function jePreklep(z, zk) {
  const fa = z.normalize('NFD').replace(/[̀-ͯ]/g, '');
  const fb = zk.normalize('NFD').replace(/[̀-ͯ]/g, '');
  if (fa.length < 4 || fb.length < 4) return false;       // krátká slova nefuzzujeme
  if (Math.abs(fa.length - fb.length) > 1) return false;
  const max = Math.min(fa.length, fb.length) <= 5 ? 1 : 2;
  const d = levenshtein(fa, fb);
  return d > 0 && d <= max;
}

// Kvalita shody dvou kmenů: přesná = 1, prefix/substring (od 4 znaků) = 0.6, překlep = 0.4, jinak 0.
// Substring až od 4 znaků: 3písmenné kmeny (např. "kol") by se jinak našly v "čokoláda", "kolébka"…
function shodaSlov(a, b) {
  if (a === b) return 1;
  if ((a.length >= 4 && b.includes(a)) || (b.length >= 4 && a.includes(b))) return 0.6;
  if (jePreklep(a, b)) return 0.4;
  return 0;
}

// spojky (do shody nepřispívají) a předložky (navíc: slova PO předložce jsou jen "doplněk")
const STOPSLOVA = new Set(['a', 'i', 'the', 'of']);
const PREDLOZKY = new Set(['na', 'do', 'ke', 'k', 'se', 's', 've', 'v', 'za', 'po', 'od', 'pro', 'z', 'ze', 'o', 'u', 'pod', 'nad', 'pri', 'při']);

// leaf → tokeny s váhou: slova po předložce ("… na kolo") jsou doplněk → váží méně,
// takže "Jízdní kola" (kolo = hlavní slovo) porazí "Řídítka na kolo" (kolo = doplněk).
function leafTokeny(posledni) {
  const toks = []; let poPredlozce = false;
  for (const w of posledni.split(/\s+/)) {
    const lw = w.toLowerCase();
    if (PREDLOZKY.has(lw)) { poPredlozce = true; continue; }
    if (w.length <= 2 || STOPSLOVA.has(lw)) continue;
    const zaklad = dejZakladSlova(w);
    if (zaklad) toks.push({ s: zaklad, w: poPredlozce ? 0.35 : 1 });
  }
  return toks;
}

// Obecné skóre shody kategorie s dotazem — BEZ výjimek pro konkrétní kategorie.
// Kombinuje: nakolik je kategorie pokrytá (přesnost, s vahou slov) × nakolik je dotaz využitý (úplnost).
function skorujKategorii(Q, T) {
  if (!Q.length || !T.length) return 0;
  const sumW = T.reduce((a, t) => a + t.w, 0);
  let pokrytoVaha = 0, pokrytoPocet = 0, presnych = 0, nepokrytoVaha = 0;
  for (const t of T) {
    let nej = 0;
    for (const q of Q) { const m = shodaSlov(q, t.s); if (m > nej) nej = m; }
    if (nej > 0) { pokrytoVaha += nej * t.w; pokrytoPocet++; if (nej === 1) presnych++; }
    else nepokrytoVaha += t.w;
  }
  if (pokrytoPocet === 0) return 0;
  let dotazPokryto = 0;
  for (const q of Q) { for (const t of T) { if (shodaSlov(q, t.s) > 0) { dotazPokryto++; break; } } }

  const presnost = pokrytoVaha / sumW;       // nakolik je kategorie "právě o tom" (0–1)
  const uplnost = dotazPokryto / Q.length;    // nakolik je dotaz využitý (0–1)

  return pokrytoPocet * 100      // absolutní: víc trefených slov = líp
       + presnost * 400          // přesnost (s vahou): celá kategorie odpovídá dotazu
       + uplnost * 100           // úplnost: dotaz je využitý
       + presnych * 5            // jemné: přesné shody > fuzzy
       - nepokrytoVaha * 30;      // mírná penalizace za nepokrytá slova kategorie
}

function vyhledejPresnouLogikou(nazevProduktu) {
  const nazevLower = nazevProduktu.toLowerCase();
  let rozsireny = nazevProduktu;
  for (const [k, v] of Object.entries(SYNONYMA)) if (nazevLower.includes(k)) rozsireny += ' ' + v;

  const slova = rozsireny.split(/\s+/).map(s => s.toLowerCase()).filter(s => s.length >= 3 && !STOPSLOVA.has(s) && !PREDLOZKY.has(s));
  const Q = [...new Set(slova.map(dejZakladSlova))].filter(Boolean);
  if (!Q.length) return [];

  const vysledky = [];
  for (const kat of CATEGORIES) {
    const posledni = kat.split('|').pop().trim().toLowerCase();
    const T = leafTokeny(posledni);
    const s = skorujKategorii(Q, T);
    if (s > 0) vysledky.push({ cesta: kat, shody: s });
  }
  return vysledky.sort((a, b) => b.shody - a.shody);
}

function najdiNejlepsiShoduVDb(slovoHledane, databaze, keys) {
  const klic = slovoHledane.toLowerCase().trim();
  if (Object.prototype.hasOwnProperty.call(databaze, klic)) return databaze[klic];
  const zaklad = dejZakladSlova(klic);
  for (const kd of keys) { if (kd === klic || dejZakladSlova(kd) === zaklad) return databaze[kd]; }
  for (const kd of keys) { const zd = dejZakladSlova(kd); if (zaklad.includes(zd) || zd.includes(zaklad)) return databaze[kd]; }
  return null;
}

/* ---- Příklad hodnoty parametru (logika z web_nastroj.py) ---- */
function prikladHodnoty(name, lang) {
  const p = name.toLowerCase();
  if (p.includes('objem') || p.includes('volume')) return '500 ml';
  if (p.includes('velikost') || p.includes('size')) return 'L';
  if (p.includes('barva') || p.includes('color') || p.includes('colour')) return lang === 'CZ' ? 'Černá' : 'Black';
  if (p.includes('váha') || p.includes('hmotnost') || p.includes('weight')) return '1.5 kg';
  if (p.includes('materiál') || p.includes('material')) return lang === 'CZ' ? 'Bavlna' : 'Cotton';
  if (p.includes('šírka') || p.includes('width') || p.includes('výška') || p.includes('height')) return '60 cm';
  return lang === 'CZ' ? 'Hodnota' : 'Value';
}

// koncová kategorie z cesty (jako web_nastroj.py: split('|')[-1].strip().lower())
const leafOf = (cesta) => cesta.split('|').pop().trim().toLowerCase();
const parseParams = (text) => (text ? text.split(',').map(s => s.trim()).filter(Boolean) : []);
// Rozdělí pravidlo na formát (před en/em-dashem) a příklad (za ním).
// Dělí jen na ' – '/' — ' (ne na ' - ' pomlčce uvnitř závorek pravidla).
const splitRule = (r) => {
  if (!r) return { format: '', example: '' };
  const m = r.match(/\s[–—]\s/);
  if (!m) return { format: r.trim(), example: '' };
  const i = r.indexOf(m[0]);
  return { format: r.slice(0, i).trim(), example: r.slice(i + m[0].length).trim() };
};

function App() {
  const { token } = theme.useToken();
  const [lang, setLang] = useState('CZ');
  const [query, setQuery] = useState('');
  const [picked, setPicked] = useState(null);
  const [copied, setCopied] = useState(false);
  const [showBuilder, setShowBuilder] = useState(false);
  const [builderVals, setBuilderVals] = useState({});
  const [nameCopied, setNameCopied] = useState(false);
  const t = I18N[lang];

  // přesně jako web_nastroj.py: relevantní shody (>= 20), top 10
  const top = useMemo(() => {
    const all = vyhledejPresnouLogikou(query.trim());
    return all.filter(s => s.shody >= 20).slice(0, 10);
  }, [query]);

  const validPick = picked && top.some(r => r.cesta === picked) ? picked : null;
  const selected = validPick ?? (top[0]?.cesta ?? null);
  const leaf = selected ? leafOf(selected) : '';
  const selectedLeafName = selected ? selected.split('|').pop().trim() : '';
  const isBest = selected && top[0] && selected === top[0].cesta;
  const rule = selected ? najdiNejlepsiShoduVDb(leaf, RULES, RULES_KEYS) : null;
  const required = selected ? parseParams(najdiNejlepsiShoduVDb(leaf, PARAMS, PARAMS_KEYS)) : [];
  const v2 = selected
    ? parseParams(najdiNejlepsiShoduVDb(leaf, PARAMS_V2, PARAMS_V2_KEYS)).sort((a, b) => a.localeCompare(b, 'cs'))
    : [];

  const onPick = (cesta) => {
    setPicked(cesta);
    setShowBuilder(false); setBuilderVals({}); setNameCopied(false);   // reset generátoru názvu
  };
  const copyPath = () => {
    if (selected) navigator.clipboard?.writeText(selected);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  const reqColumns = [
    { title: t.colParam, dataIndex: 'name', key: 'name',
      render: (v) => html`<${Text} strong>${v}<//>` },
    { title: t.colExample, dataIndex: 'example', key: 'example',
      render: (v) => html`<${Text} type="secondary">${v}<//>` },
    { title: t.colXml, dataIndex: 'name', key: 'xml',
      render: (_, r) => html`
        <div style=${{ position: 'relative', background: token.colorFillTertiary,
                       border: '1px solid ' + token.colorBorderSecondary, borderRadius: token.borderRadiusLG,
                       padding: '12px 36px 12px 14px' }}>
          <${Text} copyable=${{ text: r.xmlFull }} style=${{ position: 'absolute', top: 8, right: 10 }} />
          <pre style=${{ margin: 0, fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
                         fontSize: token.fontSizeSM, lineHeight: 1.7, whiteSpace: 'pre',
                         overflowX: 'auto', color: token.colorText }}>${r.xmlFull}</pre>
        </div>` },
  ];
  const reqData = required.map((name, i) => {
    const ex = prikladHodnoty(name, lang);
    return { key: i, name, example: ex, xmlFull: `<PARAM>\n  <PARAM_NAME>${name}</PARAM_NAME>\n  <VAL>${ex}</VAL>\n</PARAM>` };
  });
  const v2Columns = [
    { title: t.colParam, dataIndex: 'name', key: 'name',
      sorter: (a, b) => a.name.localeCompare(b.name, 'cs'),
      render: (v) => html`<${Text}>${v}<//>` },
  ];
  const v2Data = v2.map((name, i) => ({ key: i, name }));

  // sdílený blok pravidla (použit v sloučené kartě i v seznamovém pohledu)
  const { format: ruleFormat, example: ruleExample } = splitRule(rule);
  const needsEan = EAN_CATEGORIES.has(leaf);
  const ruleBlock = html`<${React.Fragment}>
    ${rule
      ? html`<div>
          <${Title} level=${3} style=${{ margin: '2px 0 0', fontWeight: 500 }}>${ruleFormat}<//>
          ${ruleExample && html`<${Text} type="secondary" style=${{ display: 'block', marginTop: 4 }}>${t.example}: ${ruleExample}<//>`}
        </div>`
      : html`<${Text} type="secondary">${t.noRule}<//>`}
    ${needsEan && html`<${Alert} type="warning" showIcon style=${{ marginTop: 12 }}
        message=${html`<${Text} strong>${t.eanNote}<//>`} />`}
  <//>`;

  // --- Volitelný generátor názvu (nepovinný, defaultně schovaný) ---
  // tokeny vzoru: "Značka | Řada (pokud je v názvu) | …" → [{label:'Řada', hint:'pokud je v názvu'}, …]
  const formatTokens = ruleFormat ? ruleFormat.split('|').map(s => {
    const raw = s.trim();
    const m = raw.match(/^(.*?)\s*\((.*)\)\s*$/);
    return m ? { label: m[1].trim(), hint: m[2].trim() } : { label: raw, hint: '' };
  }).filter(tk => tk.label) : [];
  const assembledName = formatTokens.map(tk => (builderVals[tk.label] || '').trim()).filter(Boolean).join(' ');
  const filledCount = formatTokens.filter(tk => (builderVals[tk.label] || '').trim()).length;
  const setBVal = (label, v) => setBuilderVals(s => ({ ...s, [label]: v }));
  const copyName = () => { if (assembledName) navigator.clipboard?.writeText(assembledName); setNameCopied(true); setTimeout(() => setNameCopied(false), 1500); };

  const nameBuilder = formatTokens.length === 0 ? null : (!showBuilder
    ? html`<div style=${{ marginTop: 14 }}>
        <${Button} type="dashed" icon=${html`<${FormOutlined} />`} onClick=${() => setShowBuilder(true)}>${t.buildName}<//>
        <${Text} type="secondary" style=${{ marginInlineStart: 10, fontSize: token.fontSizeSM }}>${t.buildOptional}<//>
      </div>`
    : html`<div style=${{ marginTop: 14 }}>
        <${Divider} style=${{ margin: '0 0 14px' }} />
        <${Flex} justify="space-between" align="center" style=${{ marginBottom: 12 }}>
          <${Text} strong>${t.buildTitle}<//>
          <${Button} type="text" size="small" icon=${html`<${UpOutlined} />`} onClick=${() => setShowBuilder(false)}>${t.hide}<//>
        <//>
        <${Space} direction="vertical" size=${10} style=${{ width: '100%' }}>
          ${formatTokens.map(tk => html`<${Input} key=${tk.label} addonBefore=${tk.label} placeholder=${tk.hint}
              value=${builderVals[tk.label] || ''} onChange=${(e) => setBVal(tk.label, e.target.value)} />`)}
        <//>
        <div style=${{ marginTop: 16, background: token.colorFillTertiary, borderRadius: token.borderRadiusLG, padding: '14px 16px' }}>
          <${Text} type="secondary" style=${{ fontSize: token.fontSizeSM }}>${t.previewLabel} (${filledCount}/${formatTokens.length})<//>
          <div style=${{ marginTop: 6, minHeight: 26 }}>
            ${assembledName ? html`<${Text} strong style=${{ fontSize: token.fontSizeLG }}>${assembledName}<//>`
                            : html`<${Text} type="secondary">${t.previewEmpty}<//>`}
          </div>
        </div>
        <${Flex} gap=${8} style=${{ marginTop: 14 }} wrap>
          <${Button} type="primary" disabled=${!assembledName} icon=${html`<${nameCopied ? CheckOutlined : CopyOutlined} />`} onClick=${copyName}>
            ${nameCopied ? t.copied : t.copyName}
          <//>
          <${Button} onClick=${() => setBuilderVals({})} disabled=${filledCount === 0}>${t.clear}<//>
        <//>
        <${Text} type="secondary" style=${{ display: 'block', marginTop: 10, fontSize: token.fontSizeSM }}>${t.buildHint}<//>
      </div>`);

  // zvýrazněná kategorizační cesta: segmenty tmavší, oddělovače světlejší, poslední tučně
  const pathParts = selected ? selected.split('|').map(s => s.trim()) : [];
  const pathNode = html`<div style=${{ marginTop: 2 }}>
    ${pathParts.map((p, i) => html`
      <${React.Fragment} key=${i}>
        <${Text} style=${{ color: i === pathParts.length - 1 ? token.colorText : token.colorTextSecondary,
                           fontWeight: i === pathParts.length - 1 ? 600 : 400 }}>${p}<//>
        ${i < pathParts.length - 1 && html`<span style=${{ color: token.colorTextQuaternary, margin: '0 6px' }}>|</span>`}
      <//>`)}
  </div>`;

  // kolečko s číslem/ikonou kroku v průvodci
  const stepBadge = (bg, color) => ({
    width: 26, height: 26, borderRadius: '50%', background: bg, color,
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
    flex: '0 0 auto', fontSize: token.fontSizeSM, fontWeight: 500,
  });

  // sdílený blok povinných parametrů (popis + tabulka) — renderuje se jen když nějaké jsou
  const reqInner = html`
    <${Paragraph} type="secondary" style=${{ marginTop: 0 }}>${t.reqDesc}<//>
    <${Table} columns=${reqColumns} dataSource=${reqData} pagination=${false} size="middle" />
  `;

  return html`
    <div class="page">
      <${Flex} justify="space-between" align="start" gap=${16} wrap="wrap">
        <${Title} level=${2} style=${{ marginTop: 0, marginBottom: 8 }}>${t.pageTitle}<//>
        <${Segmented} value=${lang} onChange=${setLang} options=${['CZ', 'EN']} />
      <//>
      <${Paragraph} type="secondary" style=${{ maxWidth: 760 }}>${t.pageDesc}<//>

      <${Alert} type="info" showIcon style=${{ marginBottom: 20 }} message=${t.feedNote} />

      <${Input.Search}
        size="large" allowClear
        placeholder=${t.searchPlaceholder}
        prefix=${html`<${SearchOutlined} style=${{ color: token.colorTextQuaternary }} />`}
        value=${query}
        onChange=${(e) => { setQuery(e.target.value); setPicked(null); }}
        style=${{ marginBottom: 20 }} />

      ${query.trim() && top.length === 0 && html`<${Card}><${Empty} description=${t.notFound} /><//>`}

      ${top.length > 0 && validPick && html`
        <${Card} style=${{ marginBottom: 16, borderInlineStart: '4px solid ' + token.colorPrimary }}>
          <${Flex} justify="flex-end" wrap style=${{ marginBottom: 14 }}>
            <${Button} icon=${html`<${LeftOutlined} />`} onClick=${() => setPicked(null)}>${t.showOthers}<//>
          <//>

          <${Flex} gap=${12} align="start" style=${{ marginBottom: 18 }}>
            <span style=${stepBadge(token.colorSuccessBg, token.colorSuccess)}><${CheckOutlined} /></span>
            <div style=${{ flex: 1, minWidth: 0 }}>
              <${Space} size=${6}>
                <${Text} strong>${t.step1}<//>
                <${Tooltip} title=${t.catInfo}><${InfoCircleOutlined} style=${{ color: token.colorTextTertiary, fontSize: token.fontSizeSM, cursor: 'help' }} /><//>
              <//>
              <${Flex} justify="space-between" align="center" gap=${12} wrap>
                <${Title} level=${3} style=${{ margin: '2px 0 0', fontWeight: 500 }}>
                  <${Space} align="center" wrap>
                    ${selectedLeafName}
                  <//>
                <//>
                <${Button} type="primary" icon=${html`<${copied ? CheckOutlined : CopyOutlined} />`} onClick=${copyPath}>
                  ${copied ? t.copied : t.copyPath}
                <//>
              <//>
              ${pathNode}
            </div>
          <//>

          <${Flex} gap=${12} align="start" style=${{ marginBottom: required.length > 0 ? 18 : 0 }}>
            <span style=${stepBadge(token.colorPrimaryBg, token.colorPrimary)}>2</span>
            <div style=${{ flex: 1, minWidth: 0 }}>
              <${Space} size=${6}>
                <${Text} strong>${t.step2}<//>
                <${Tooltip} title=${t.nameInfo}><${InfoCircleOutlined} style=${{ color: token.colorTextTertiary, fontSize: token.fontSizeSM, cursor: 'help' }} /><//>
              <//>
              ${ruleBlock}
              ${nameBuilder}
            </div>
          <//>

          ${required.length > 0 && html`
            <${Flex} gap=${12} align="start">
              <span style=${stepBadge(token.colorErrorBg, token.colorError)}>3</span>
              <div style=${{ flex: 1, minWidth: 0 }}>
                <${Flex} justify="space-between" align="center" style=${{ marginBottom: 8 }}>
                  <${Text} strong>${t.step3}<//>
                  <${Tag} color="error">${required.length}<//>
                <//>
                ${reqInner}
              </div>
            <//>
          `}
        <//>
      `}

      ${top.length > 0 && !validPick && html`
        <${Card} style=${{ marginBottom: 16 }} styles=${{ body: { padding: 0 } }}>
          <${List}
            header=${html`<${Text} strong style=${{ paddingInline: 16 }}>${t.rankHeader}<//>`}
            dataSource=${top}
            renderItem=${(item, idx) => {
              const isSel = item.cesta === selected;
              const leafName = item.cesta.split('|').pop().trim();
              const reqHere = parseParams(najdiNejlepsiShoduVDb(leafOf(item.cesta), PARAMS, PARAMS_KEYS));
              return html`
                <${List.Item}
                  onClick=${() => onPick(item.cesta)}
                  style=${{ cursor: 'pointer', paddingInline: 16, display: 'block',
                            background: isSel ? token.colorPrimaryBg : 'transparent',
                            borderInlineStart: '3px solid ' + (isSel ? token.colorPrimary : 'transparent') }}>
                  <${Space} align="center" wrap>
                    <${Text} strong>${leafName}<//>
                    ${isSel && idx !== 0 && html`<${Tag} color="processing">${t.selected}<//>`}
                  <//>
                  <div style=${{ color: token.colorTextSecondary, fontSize: token.fontSizeSM, marginTop: 2 }}>${item.cesta}</div>
                  ${reqHere.length > 0 && html`
                    <div style=${{ marginTop: 6 }}>
                      <${Text} type="secondary" style=${{ fontSize: token.fontSizeSM, marginInlineEnd: 6 }}>${t.requiredHint}:<//>
                      <${Space} size=${[4, 4]} wrap>
                        ${reqHere.map(p => html`<${Tag} key=${p} color="error" style=${{ marginInlineEnd: 0 }}>${p}<//>`)}
                      <//>
                    </div>`}
                <//>`;
            }} />
        <//>
      `}

      ${top.length > 0 && html`
        <div id="proto-detail">
          ${!validPick && html`<${Card} title=${t.ruleTitle} style=${{ marginBottom: 16 }}>${ruleBlock}<//>`}

          ${!validPick && required.length > 0 && html`
            <${Card} title=${t.reqTitle} style=${{ marginBottom: 16 }}
              extra=${html`<${Tag} color="error">${required.length}<//>`}>
              ${reqInner}
            <//>`}

          <${Card} extra=${html`<${Tag} color="blue">${v2.length}<//>`}
            title=${html`<${Space} size=${6}>
              ${t.v2Title}
              <${Tooltip} title=${t.v2Info}>
                <${InfoCircleOutlined} style=${{ color: token.colorTextTertiary, fontSize: token.fontSizeSM, cursor: 'help' }} />
              <//>
            <//>`}>
            ${v2.length
              ? html`<div style=${{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                  ${v2.map(p => html`<${Tag} key=${p} style=${{ margin: 0, borderRadius: 20, padding: '4px 13px',
                      background: token.colorFillTertiary, border: 'none', color: token.colorTextSecondary,
                      fontSize: token.fontSize }}>${p}<//>`)}
                </div>`
              : html`<${Text} type="secondary">${t.noV2}<//>`}
          <//>
        </div>

        <${Divider} />
        <${Alert} type="info" showIcon message=${t.support} />
      `}
    </div>
  `;
}

const root = createRoot(document.getElementById('root'));
root.render(html`
  <${ConfigProvider} theme=${{ token: { colorPrimary: '#1677ff', borderRadius: 6 } }}>
    <${App} />
  <//>
`);

/* ---- Review mode wiring (mimo produkt) ---- */
const toggle = document.getElementById('review-toggle');
const summary = document.getElementById('review-summary');
function refreshSummary() {
  const n = document.querySelectorAll('[data-proto]').length;
  summary.innerHTML = '<b>Review mode</b><br/>Tento prototyp obsahuje <b>' + n +
    '</b> nestandardních (<code>_proto</code>) komponent.' +
    (n ? ' Doporučeno: přidat do knihovny. Schvaluje designér.'
       : ' Vše je standardní One Admin UI (Ant 6).');
}
toggle.addEventListener('change', (e) => {
  document.body.classList.toggle('review-on', e.target.checked);
  if (e.target.checked) refreshSummary();
});
</script>
</body>
</html>
